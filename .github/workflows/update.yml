name: Daily data refresh

on:
  schedule:
    - cron: "30 12 * * *"   # 12:30 UTC = 6:00 PM IST (after NSE close at 3:30 PM IST)
  workflow_dispatch:

# Only one update at a time. Newer runs queue; in-progress runs finish first.
concurrency:
  group: daily-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python scripts/fetch_data.py

      - name: Commit data if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"

          # Retry push if remote moved while we were running.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — pulling latest and retrying…"
            git pull --no-rebase --strategy-option=ours --no-edit origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
